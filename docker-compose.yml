services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai-instagram-auto-publisher
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:5173
      API_URL: http://localhost:5001
    ports:
      - "5001:5000"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

  client:
    build: ./client
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data:
